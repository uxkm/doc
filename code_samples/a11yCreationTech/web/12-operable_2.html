<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[조작 가능] 준수 사례</title>
		<style>
      .pagination {
        display: flex;
        gap: 8px;
        list-style: none;
        padding: 0;
      }
      .page-btn-good {
        min-width: 44px;
        min-height: 44px;
        padding: 10px; /* 내부 여백 확보 */
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background-color: white;
        cursor: pointer;
      }
		</style>
	</head>
	<body>
		<nav aria-label="페이지네이션">
			<ul class="pagination">
				<li><button class="page-btn-good" aria-label="페이지 1">1</button></li>
				<li><button class="page-btn-good" aria-label="페이지 2">2</button></li>
				<li><button class="page-btn-good" aria-label="페이지 3">3</button></li>
			</ul>
		</nav>
	</body>
</html>
