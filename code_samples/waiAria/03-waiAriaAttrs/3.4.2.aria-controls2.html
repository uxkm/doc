<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>aria-controls 속성 - 모달 대화 상자에서의 사용 예시 | 드래그 앤 드롭 속성 (WAI-ARIA)</title>
		<style>
      #open-modal {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      #open-modal:hover {
        background-color: #45a049;
      }
      #modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5); /* 반투명한 배경 */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000; /* 항상 최상위에 나타나도록 */
      }
      [role="document"] {
        background-color: white;
        border-radius: 10px;
        padding: 20px;
        width: 400px;
        max-width: 90%;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      h2 {
        margin-top: 0;
        font-size: 24px;
        color: #333;
      }
      #close-modal {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #f44336;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
        display: block;
        margin-top: 20px;
      }
      #close-modal:hover {
        background-color: #d32f2f;
      }
      #modal[hidden] {
        display: none;
      }
		</style>
	</head>
	<body>
		<button id="open-modal" aria-controls="modal" aria-expanded="false">
			모달 열기
		</button>

		<div id="modal" role="dialog" aria-modal="true" hidden>
			<div role="document">
				<h2>모달 제목</h2>
				<p>이것은 모달의 내용입니다.</p>
				<button id="close-modal">모달 닫기</button>
			</div>
		</div>

		<script>
			const openButton = document.getElementById('open-modal');
			const modal = document.getElementById('modal');
			const closeButton = document.getElementById('close-modal');

			openButton.addEventListener('click', () => {
				modal.hidden = false;
				openButton.setAttribute('aria-expanded', 'true');
				closeButton.focus(); // 모달이 열리면 닫기 버튼에 포커스
			});

			closeButton.addEventListener('click', () => {
				modal.hidden = true;
				openButton.setAttribute('aria-expanded', 'false');
				openButton.focus(); // 모달이 닫히면 버튼으로 포커스 반환
			});

			// ESC 키로 모달 닫기
			modal.addEventListener('keydown', (event) => {
				if (event.key === 'Escape') {
					modal.hidden = true;
					openButton.setAttribute('aria-expanded', 'false');
					openButton.focus();
				}
			});
		</script>
	</body>
</html>
