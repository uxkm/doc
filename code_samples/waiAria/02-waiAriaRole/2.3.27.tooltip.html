<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>동적 툴팁 사용 예시 | 문서 구조 역할(WAI-ARIA)</title>
		<style>
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
      }

      /* 툴팁 디자인 */
      #tooltip {
        display: none;
        position: absolute;
        background-color: #333;
        color: #fff;
				margin-top: 10px;
        padding: 10px;
        border-radius: 5px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        font-size: 14px;
        max-width: 200px;
        z-index: 1000;
        transition: opacity 0.3s ease;
        opacity: 0; /* 초기 투명도 */
      }

      button:hover ~ #tooltip {
				display: block;
				opacity: 1;
			}

      #tooltip::after {
        content: '';
        position: absolute;
        bottom: 100%;
        left: 35px;
        transform: translateX(-50%);
        border-width: 5px;
        border-style: solid;
        border-color: transparent transparent #333 transparent;
      }
		</style>
	</head>
	<body>
		<button aria-describedby="tooltip">
			Info
		</button>
		<div role="tooltip" id="tooltip">
			마우스를 올리면 추가 정보가 제공됩니다.
		</div>
	</body>
</html>
