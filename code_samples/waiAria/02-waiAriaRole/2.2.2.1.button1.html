<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>커스텀 스타일 버튼 예시 | 독립형 위젯 역할(WAI-ARIA)</title>
		<style>
      .btn-rounded {
        background-color: #4CAF50;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
      }
      .btn-rounded:hover {
        background-color: #45a049;
      }

      .btn-shadow {
        background-color: #008CBA;
        color: white;
        padding: 12px 28px;
        border: none;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        transition: box-shadow 0.3s ease;
      }
      .btn-shadow:hover {
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.4);
      }

      .btn-box {
        background-color: transparent;
        color: #4CAF50;
        padding: 12px 24px;
        border: 2px solid #4CAF50;
        cursor: pointer;
      }
      .btn-box:hover {
        background-color: #4CAF50;
        color: white;
      }

      .btn-animated {
        background-color: #f44336;
        color: white;
        padding: 12px 28px;
        border: none;
        cursor: pointer;
        transition: transform 0.3s ease-in-out;
      }
      .btn-animated:hover {
        transform: scale(1.1);
      }
		</style>
	</head>
	<body>
		<p>기본적인 둥근 모서리 버튼</p>
		<button type="button" class="btn-rounded">Rounded Button</button>
		<hr>
		<p>그림자와 함께하는 입체 버튼</p>
		<button type="button" class="btn-shadow">Shadow Button</button>
		<hr>
		<p>일반적인 박스 버튼</p>
		<button type="button" class="btn-box">Box Button</button>
		<hr>
		<p>애니메이션이 들어간 버튼</p>
		<button type="button" class="btn-animated">Animated Button</button>
		<hr>
	</body>
</html>
