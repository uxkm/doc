<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>동적 확장/축소 가능한 combobox 예시 | 복합형 위젯 역할(WAI-ARIA)</title>
		<style>
		</style>
	</head>
	<body>
		<label for="combo2">옵션을 선택하세요:</label>
		<input id="combo2" type="text" role="combobox" aria-expanded="false" aria-controls="listbox2" aria-autocomplete="list" aria-haspopup="listbox">
		<ul id="listbox2" role="listbox" hidden>
			<li role="option" tabindex="-1" data-value="option1">Option 1</li>
			<li role="option" tabindex="-1" data-value="option2">Option 2</li>
			<li role="option" tabindex="-1" data-value="option3">Option 3</li>
		</ul>

		<script>
			const combobox = document.getElementById('combo2');
			const listbox = document.getElementById('listbox2');

			// Combobox에 입력이 있을 때 리스트박스를 보여줌
			combobox.addEventListener('input', function() {
				combobox.setAttribute('aria-expanded', 'true');
				listbox.hidden = false;
			});

			// Listbox의 옵션을 클릭하면 input 값에 반영하고 리스트박스를 닫음
			listbox.addEventListener('mousedown', function(event) {
				const clickedOption = event.target;
				if (clickedOption.getAttribute('role') === 'option') {
					combobox.value = clickedOption.textContent;
					combobox.setAttribute('aria-expanded', 'false');
					listbox.hidden = true;
				}
			});

			// Combobox에서 포커스가 나가면 리스트박스를 숨김 (단, 클릭할 때는 바로 숨기지 않음)
			combobox.addEventListener('focusout', function(event) {
				if (!listbox.contains(event.relatedTarget)) {
					combobox.setAttribute('aria-expanded', 'false');
					listbox.hidden = true;
				}
			});
		</script>
	</body>
</html>
