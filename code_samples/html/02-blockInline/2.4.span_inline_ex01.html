<!DOCTYPE html>
<html lang="ko">
<head>
	<title>span을 이용하여 text 스타일링</title>
</head>
<body>
	<p>특정 단어를 <span style="color: red;">빨간색</span>으로 강조합니다.</p>
	<p>특정 단어만 <span style="font-style: italic;">기울여</span> 표시합니다.</p>
	<p>특정 단어의 <span style="background-color: yellow;">배경을 노란색으로</span> 표시합니다.</p>
</body>
</html>
