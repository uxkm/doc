<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=1.0, initial-scale=1.0">
	<title>HTML 속성 사용</title>
</head>
<body>
	<strong>title 속성 사용</strong>
	<p>
		퍼블리셔는
		<span class="definition" title="Hypertext Markup Language">HTML</span>,
		<span class="definition" title="Cascading Style Sheets">CSS</span>,
		<span class="definition" title="객체 기반의 스크립트 프로그래밍 언어">Javascript</span>를
		기본 소양으로 가지고 있어야 합니다.
	</p>

	<hr />

	<strong>lang 속성 사용</strong>
	<p>이 문장의 '<span lang="en">This text is in English.</span>'는 영어로 작성된 텍스트 입니다.</p>
	<p>이 문장의 '<span lang="fr">Ce texte est en français.</span>'는 프랑스어로 작성된 텍스트입니다.</p>

	<style>
    .definition {
      border-bottom: 1px dotted blue;
      cursor: help;
    }
	</style>
</body>
</html>
