<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>너비와 높이 설정</title>
	</head>
	<body>
		<div style="height: 60px; border: 1px solid red;">
			너비 : 속성 값을 지정하지 않음(기본 한 줄 전체 차지)<br />
			높이 : 60px
		</div>
		<div style="width: 100px; height: 40px; border: 1px solid blue;">
			너비 : 100px<br />
			높이 : 40px
		</div>
		<div style="width: 80%; height: 100px; border: 1px solid green;">
			너비 : 80%<br />
			높이 : 100px
		</div>
	</body>
</html>
