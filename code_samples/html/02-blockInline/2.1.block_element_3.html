<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>다른 요소 포함</title>
		<style>
			div {background-color: #ddd; border: 1px solid #999;}
			p {background-color: pink;}
			span {color: #fff; background-color: black;}
		</style>
	</head>
	<body>
		<div>
			<p>블록 요소 안에 블록 요소가 포함될 수 있습니다.</p>
		</div>
		<p>
			블록 요소 안에 <span>인라인 요소</span>가 포함될 수 있습니다.
		</p>
	</body>
</html>
