<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>새로운 줄 생성 없음</title>
	</head>
	<body>
		<!-- 불록 예제 -->
		<div>
			블록 요소는 <p style="color: blue;">텍스트가 자동으로 줄 바꿈 되지만,</p>
		</div>
		<hr />
		<!-- 인라인 예제 -->
		<div>
			인라인 요소는 <span style="color: blue;">텍스트의 줄 바꿈이 자동으로 되지 않습니다.</span>
		</div>
	</body>
</html>
