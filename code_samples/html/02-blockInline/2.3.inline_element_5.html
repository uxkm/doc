<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>상하 여백 조정 어려움</title>
	</head>
	<body>
		<p>
			인라인 요소는
			<span style="padding: 0 10px; border: 1px solid green;">좌우 내부 여백</span>,
			<span style="margin: 0 10px; border: 1px solid green;">좌우 외부 여백</span>,
			조절은 가능하지만,
		</p>
		<p>
			<span style="padding: 30px 0; border: 1px solid red;">상하 내부 여백</span>
			<span style="margin: 20px 0; border: 1px solid red;">상하 외부 여백</span>
			조절이 어렵습니다.
		</p>
		<hr />
		<p>
			display 속성을 변경하여
			<span style="display: inline-block; padding: 25px; border: 1px solid green;">좌우 내부 여백</span>,
			<span style="display: inline-block; margin: 15px; border: 1px solid blue;">좌우 외부 여백</span>,
			조절이 가능합니다.
		</p>
	</body>
</html>
