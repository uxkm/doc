<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>불릿 스타일 1</title>
		<style>
			h2 {
				margin: 7px 0 0;
			}
			ul {
				margin: 10px 0;
			}
		</style>
	</head>
	<body>
		<h2>기본</h2>
		<ul style="list-style-type: disc;">
			<li>사과</li>
			<li>바나나</li>
			<li>포도</li>
		</ul>
		<hr>

		<h2>빈 원</h2>
		<ul style="list-style-type: circle;">
			<li>사과</li>
			<li>바나나</li>
			<li>포도</li>
		</ul>
		<hr>

		<h2>사각형</h2>
		<ul style="list-style-type: square;">
			<li>사과</li>
			<li>바나나</li>
			<li>포도</li>
		</ul>
	</body>
</html>
