<!DOCTYPE html>
<html lang="ko">
<head>
	<title>ol [type]</title>
</head>
<body>
	<h2>기본</h2>
	<ol start="7">
		<li>일곱 번째</li>
		<li>여덟 번째</li>
		<li>아홉 번째</li>
	</ol>
	<hr>

	<h2>소문자 알파벳</h2>
	<ol type="a" start="3">
		<li>세 번째</li>
		<li>네 번째</li>
		<li>다섯 번째</li>
	</ol>
	<hr>

	<h2>대문자 알파벳</h2>
	<ol type="A" start="11">
		<li>열한 번째</li>
		<li>열두 번째</li>
		<li>열세 번째</li>
	</ol>
	<hr>

	<h2>소문자 로마 숫자</h2>
	<ol type="i" start="5">
		<li>다섯 번째</li>
		<li>여섯 번째</li>
		<li>일곱 번째</li>
	</ol>
	<hr>

	<h2>대문자 로마 숫자</h2>
	<ol type="I" start="9">
		<li>아홉 번째</li>
		<li>열 번째</li>
		<li>열한 번째</li>
	</ol>
</body>
</html>
