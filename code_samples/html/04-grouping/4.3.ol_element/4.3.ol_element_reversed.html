<!DOCTYPE html>
<html lang="ko">
<head>
	<title>ol [type]</title>
</head>
<body>
	<h2>기본</h2>
	<ol reversed>
		<li>세 번째</li>
		<li>두 번째</li>
		<li>첫 번째</li>
	</ol>
	<hr>

	<h2>소문자 알파벳</h2>
	<ol type="a" reversed>
		<li>세 번째</li>
		<li>두 번째</li>
		<li>첫 번째</li>
	</ol>
	<hr>

	<h2>대문자 알파벳</h2>
	<ol type="A" reversed>
		<li>세 번째</li>
		<li>두 번째</li>
		<li>첫 번째</li>
	</ol>
	<hr>

	<h2>소문자 로마 숫자</h2>
	<ol type="i" reversed>
		<li>세 번째</li>
		<li>두 번째</li>
		<li>첫 번째</li>
	</ol>
	<hr>

	<h2>대문자 로마 숫자</h2>
	<ol type="I" reversed>
		<li>세 번째</li>
		<li>두 번째</li>
		<li>첫 번째</li>
	</ol>
</body>
</html>
