<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[object] MP4 비디오 파일 포함</title>
		<style>
      *, html, body {margin: 0; padding: 0;}
      html {overflow: hidden;}
      object {
        position: absolute; left: 0; top: 0;
        width: 100%; height: 100%;
        object-fit: cover;
      }
		</style>
	</head>
	<body>
		<object data="/images/media/flower.mp4" type="video/mp4" width="640" height="360">
			브라우저가 비디오를 지원하지 않습니다.
			<a href="/images/media/flower.mp4" download>비디오 다운로드</a>
		</object>
	</body>
</html>
