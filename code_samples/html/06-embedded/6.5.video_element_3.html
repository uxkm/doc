<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[video] 비디오 썸네일 추가</title>
		<style>
			*, html, body {
				margin: 0; padding: 0;
			}
      html {
				overflow: hidden;
			}
			video {
				position: absolute; left: 0; top: 0;
				width: 100%; height: 100%;
        object-fit: cover;
			}
		</style>
	</head>
	<body>
		<video id="myVideo"
					 src="/_assets/images/mr.chu_video.mp4"
					 poster="/_assets/images/mr.chu_video_cover.jpg"
					 controls preload="metadata">
			브라우저가 비디오 태그를 지원하지 않습니다.
		</video>

		<script>
      const video = document.getElementById("myVideo");
      video.volume = 0.1; // 볼륨을 10%로 설정
		</script>
	</body>
</html>
