<!DOCTYPE html>
	<html lang="ko">
	<head>
		<title>[iframe] srcdoc을 활용한 내부 HTML 문서 포함</title>
	</head>
	<body>
		<iframe srcdoc="
			<html>
					<head><title>내부 페이지</title></head>
					<body>
							<h2>이것은 iframe 내부 HTML입니다.</h2>
							<p>srcdoc 속성을 사용하여 HTML을 직접 삽입할 수 있습니다.</p>
					</body>
			</html>
		" width="400" height="200"></iframe>

		<style>
			*, html, body {
				margin:0; padding:0;
			}
			iframe {
				position:absolute; left:0; top:0;
				width:100%; height:100%;
				border:0;
			}
		</style>
	</body>
</html>
