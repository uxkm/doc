<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[svg] 기본 도형 (원, 사각형, 선, 다각형) 그리기</title>
	</head>
	<body>
		<svg width="300" height="200">
			<rect x="10" y="10" width="100" height="100" fill="blue" />
			<circle cx="200" cy="100" r="50" fill="red" />
			<line x1="0" y1="0" x2="300" y2="200" stroke="black" stroke-width="2" />
			<polygon points="150,10 180,80 120,80" fill="green" />
		</svg>
	</body>
</html>
