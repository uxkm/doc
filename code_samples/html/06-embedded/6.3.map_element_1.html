		<style>
			.map-container {
				max-width: 900px;
				margin: 0 auto;
        background-size: 100% auto;
        background-repeat: no-repeat;
        background-position: center top;
        background-image: url("/_assets/images/world-map-image.svg");
			}
      .map-image {
        background-size: 100% auto;
        background-repeat: no-repeat;
        background-position: center top;
			}
      .map-container img {
				width: 100%;
				height: auto;
			}

			/* asia */
      .asia:hover img {
        opacity: 0;
      }
      .asia:hover .map-image {
        background-image: url("/_assets/images/world-map-asia.svg");
      }

      /* oceania */
      .oceania:hover img {
        opacity: 0;
      }
      .oceania:hover .map-image {
        background-image: url("/_assets/images/world-map-oceania.svg");
      }

      /* africa */
      .africa:hover img {
        opacity: 0;
      }
      .africa:hover .map-image {
        background-image: url("/_assets/images/world-map-africa.svg");
      }

      /* europe */
      .europe:hover img {
        opacity: 0;
      }
      .europe:hover .map-image {
        background-image: url("/_assets/images/world-map-europe.svg");
      }

      /* north_america */

        opacity: 0;
      }
      .north_america:hover .map-image {
        background-image: url("/_assets/images/world-map-north_america.svg");
      }

      /* south_america */
      .south_america:hover img {
        opacity: 0;
      }
      .south_america:hover .map-image {
        background-image: url("/_assets/images/world-map-south_america.svg");
      }
		</style>

			</map>
		</div>

		<script>
			// 원본 이미지 크기 (예제에서는 700px 기준)
			const originalWidth = 700;
			const worldMap = document.getElementById("world-map");
			const areas = document.querySelectorAll("map area");

			// 기존 coords 값을 저장
			const originalCoords = Array.from(areas).map(area => area.coords.split(",").map(Number));

			function resizeMap() {
				const currentWidth = worldMap.clientWidth; // 현재 이미지 너비
				const scaleFactor = currentWidth / originalWidth; // 크기 비율

				areas.forEach((area, index) => {
					const newCoords = originalCoords[index].map(coord => Math.round(coord * scaleFactor));
					area.coords = newCoords.join(",");
				});
			}

			// 창 크기 조절 시 업데이트
			window.addEventListener("resize", resizeMap);
			window.addEventListener("load", resizeMap);

			// 마우스 호버
			document.addEventListener("DOMContentLoaded", () => {
				const mapContainer = document.querySelector(".map-container");
				const areas = document.querySelectorAll("map area");

				areas.forEach(area => {
					area.addEventListener("mouseenter", () => {
						const areaType = area.getAttribute("data-area");
						if (areaType) {
							mapContainer.classList.add(areaType);
						}
					});

					area.addEventListener("mouseleave", () => {
						const areaType = area.getAttribute("data-area");
						if (areaType) {
							mapContainer.classList.remove(areaType);
						}
					});
				});
			});
		</script>
	</body>
</html>
