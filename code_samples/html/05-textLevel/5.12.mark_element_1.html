<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>mark element 상황별 예제</title>
	</head>
	<body>
		<h2>검색 결과 강조</h2>
		<p>검색 결과: "HTML에서 <mark>mark</mark> 태그 사용 방법"</p>
		<hr>

		<h2>중요한 문장 강조</h2>
		<p>오늘의 중요한 공지: <mark>회의는 오후 3시에 시작합니다.</mark></p>
		<hr>

		<h2>문맥 강조</h2>
		<p>
			다음 문장에서 중요한 키워드:
			<mark>HTML5</mark>, <mark>시맨틱 웹</mark>, <mark>접근성</mark>.
		</p>
	</body>
</html>
