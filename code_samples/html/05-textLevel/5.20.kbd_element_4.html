<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>kbd element CSS로 스타일링된 키보드 입력</title>
		<style>
			p {
				line-height: 24px;
			}
      kbd {
				vertical-align: top;
        background-color: #f4f4f4;
        border: 1px solid #ccc;
        padding: 2px 5px;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
      }
		</style>
	</head>
	<body>
		<p>
			파일을 저장하려면 <kbd>Ctrl</kbd> + <kbd>S</kbd>를 누르세요.
		</p>
	</body>
</html>
