<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>var element 코드에서 변수 표현</title>
	</head>
	<body>
		<p>
			JavaScript에서 변수는 <code>let</code> 또는 <code>const</code> 키워드와 함께 선언됩니다:
			<code>let <var>x</var> = 10;</code>
		</p>
		<hr>
		<p>
			JavaScript 코드 예제: <code>let <var>variableName</var> = 10;</code>
		</p>
	</body>
</html>
