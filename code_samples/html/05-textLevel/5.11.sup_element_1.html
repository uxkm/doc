<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>sup element 상황별 예제</title>
	</head>
	<body>
		<h2>수학식</h2>
		<p>피타고라스의 정리: a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup></p>
		<hr>

		<h2>과학 기호</h2>
		<p>아인슈타인의 공식: E = mc<sup>2</sup></p>
		<hr>

		<h2>각주 번호</h2>
		<p>이 문장은 각주를 포함합니다<sup>1</sup>.</p>
	</body>
</html>
