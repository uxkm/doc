<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>rp element</title>
	</head>
	<body>
		<strong>[일본어 후리가나 + &lt;rp&gt; 사용]</strong>
		<p>
			루비 지원 브라우저:
			<ruby style="color: #1560d1;">
				学校 <rp>(</rp><rt>がっこう</rt><rp>)</rp>
			</ruby>
		</p>
		<p>
			루비 미지원 브라우저: <span style="color: #e8204d;">学校(がっこう)</span>
		</p>
		<hr>

		<strong>[중국어 병음 + &lt;rp&gt; 사용]</strong>
		<p>
			루비 지원 브라우저:
			<ruby style="color: #1560d1;">
				北京 <rp>(</rp><rt>Běijīng</rt><rp>)</rp>
			</ruby>
		</p>
		<p>
			루비 미지원 브라우저: <span style="color: #e8204d;">北京(Běijīng)</span>
		</p>
	</body>
</html>
