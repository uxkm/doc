<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>rtc element</title>
	</head>
	<body>
		<strong>[일본어 발음 + 영어 번역 동시 제공]</strong>
		<p>
			<ruby>
				日本
				<rtc><rt>にほん</rt></rtc>
				<rtc><rt>Japan</rt></rtc>
			</ruby>
		</p>
		<hr>

		<strong>[한국어 한자 + 한글 + 영어 설명]</strong>
		<p>
			루비 지원 브라우저:
			<ruby>
				韓國
				<rtc><rt>한국</rt></rtc>
				<rtc><rt>Korea</rt></rtc>
			</ruby>
		</p>
	</body>
</html>
