<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>var element 수학 공식</title>
	</head>
	<body>
		<p>
			피타고라스의 정리: <var>a</var><sup>2</sup> + <var>b</var><sup>2</sup> = <var>c</var><sup>2</sup>
		</p>
		<hr>
		<p>
			수학 공식: <var>x</var> + <var>y</var> = <var>z</var>
		</p>
		<hr>
		<figure>
			<math>
				<mi>a</mi>
				<mo>=</mo>
				<msqrt>
					<msup><mi>b</mi><mn>2</mn></msup>
					<mi>+</mi>
					<msup><mi>c</mi><mn>2</mn></msup>
				</msqrt>
			</math>
			<figcaption>
				피타고라스 정리를 사용하여 변 <var>b</var>와 <var>c</var>를 가진 삼각형의 빗변 <var>a</var>를 구하기.
			</figcaption>
		</figure>
	</body>
</html>
