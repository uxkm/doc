<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>abbr element CSS로 스타일링된 약어</title>
		<style>
      abbr {
        text-decoration: underline solid;
				font-weight: bold;
				color: #0050c9;
        cursor: help;
      }
		</style>
	</head>
	<body>
		<p>
			웹 표준은 <abbr title="World Wide Web Consortium">W3C</abbr>에 의해 정의됩니다.
		</p>
	</body>
</html>
