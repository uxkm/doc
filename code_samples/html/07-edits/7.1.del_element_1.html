<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[del] 정가 / 할인가</title>
	</head>
	<body>
		<p class="price">
			정가: <del>₩50,000</del> →
			할인가: <strong>₩35,000</strong>
		</p>

		<style>
			.price {
				font-size: 1.2em;
			}
			.price del {
				color: gray;
				margin-right: 8px;
			}
			.price strong {
				color: #1e73ff;
			}
		</style>
	</body>
</html>
