<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[ins] 정가 / 할인가</title>
	</head>
	<body>
		<dl class="support-time">
			<dt>
				<strong>[변경된 고객 지원 운영 시간]</strong>
			</dt>
			<dd>
				기존 : <del>월~금 9:00 AM - 6:00 PM</del>
			</dd>
			<dd>
				변경 : <ins>월~금 8:30 AM - 5:30 PM</ins>
			</dd>
		</dl>

		<style>
			dd {margin-left: 0; margin-top: 4px;}
			dt + dd {margin-top:10px;}
			.support-time del {
				color: gray;
				margin-right: 10px;
			}
			.support-time ins {
				color: green;
				font-weight: bold;
			}
		</style>
	</body>
</html>
