<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[th] 펜션 객실 예약 테이블</title>
	</head>
	<body>
		<table aria-label="펜션 객실 예약 테이블">
			<caption>객실 유형별 요금 및 예약 가능 여부</caption>
			<thead>
				<tr>
					<th id="room">객실 유형</th>
					<th id="weekday">평일 요금</th>
					<th id="weekend">주말 요금</th>
					<th id="status">예약 가능 여부</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<th id="standard" headers="room" scope="row">스탠다드룸</th>
					<td headers="room weekday">₩100,000</td>
					<td headers="room weekend">₩120,000</td>
					<td headers="room status">가능</td>
				</tr>
				<tr>
					<th id="deluxe" headers="room" scope="row">디럭스룸</th>
					<td headers="room weekday">₩150,000</td>
					<td headers="room weekend">₩180,000</td>
					<td headers="room status">예약 불가</td>
				</tr>
			</tbody>
		</table>

		<style>
      table {
        width: 100%;
				min-width: 400px;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #bbb;
        padding: 8px;
      }
      th {
        background-color: #eee;
      }
		</style>
	</body>
</html>
