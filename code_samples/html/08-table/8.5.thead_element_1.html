<!DOCTYPE html>
<html lang="ko">
<head>
	<title>[thead] thead를 고정하여 스크롤 시 항상 보이게 설정</title>
	<style>
		body {
			margin: 20px;
		}
		.table-container {
			position: relative;
			overflow-y: auto;
			width: 100%;
			max-width: 800px;
			height: 300px;
			border: 2px solid #ccc;
		}
		table {
			width: 100%;
			border-spacing: 0;
			border-collapse: separate;
		}
		thead {
			position: sticky;
			z-index: 10;
			top: 0;
		}
		th, td {
			padding: 10px;
			text-align: center;
			background-color: white;
			box-shadow: 0 0 0 1px #d9d9d9;
		}
		th {
			background-color: #e9e9e9;
		}
		tr:nth-child(even) td {
			background-color: #f9f9f9;
		}
	</style>
</head>
<body>

<h2>펜션 객실 정보</h2>
	<div class="table-container">
		<table>
			<thead>
				<tr>
					<th>객실명</th>
					<th>최대 인원</th>
					<th>가격</th>
					<th>시설</th>
				</tr>
			</thead>
			<tbody>
				<tr><td>하늘방</td><td>4명</td><td>100,000원</td><td>TV, 에어컨</td></tr>
				<tr><td>바다방</td><td>6명</td><td>150,000원</td><td>TV, 냉장고</td></tr>
				<tr><td>숲속방</td><td>2명</td><td>80,000원</td><td>에어컨, 와이파이</td></tr>
				<tr><td>별빛방</td><td>5명</td><td>130,000원</td><td>TV, 에어컨, 냉장고</td></tr>
				<tr><td>햇살방</td><td>3명</td><td>90,000원</td><td>와이파이, 커피머신</td></tr>
				<tr><td>달빛방</td><td>4명</td><td>110,000원</td><td>TV, 와이파이</td></tr>
				<tr><td>산들바람방</td><td>7명</td><td>180,000원</td><td>냉장고, 전자레인지</td></tr>
				<tr><td>노을방</td><td>3명</td><td>95,000원</td><td>에어컨, 커피머신</td></tr>
				<tr><td>구름방</td><td>2명</td><td>75,000원</td><td>와이파이</td></tr>
				<tr><td>은하수방</td><td>6명</td><td>160,000원</td><td>TV, 냉장고, 전자레인지</td></tr>
				<tr><td>꿈나무방</td><td>5명</td><td>140,000원</td><td>TV, 에어컨</td></tr>
			</tbody>
		</table>
	</div>
</body>
</html>
