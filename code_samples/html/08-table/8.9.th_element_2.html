<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[th] 학생 성적표</title>
	</head>
	<body>
		<table>
			<thead>
				<tr>
					<th rowspan="2">이름</th>
					<th colspan="2" scope="colgroup">국어</th>
					<th colspan="2" scope="colgroup">수학</th>
				</tr>
				<tr>
					<th scope="col">중간고사</th>
					<th scope="col">기말고사</th>
					<th scope="col">중간고사</th>
					<th scope="col">기말고사</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<th scope="rowgroup">학생 A</th>
					<td>85</td>
					<td>90</td>
					<td>80</td>
					<td>88</td>
				</tr>
				<tr>
					<th scope="rowgroup">학생 B</th>
					<td>78</td>
					<td>83</td>
					<td>92</td>
					<td>95</td>
				</tr>
				<tr>
					<th scope="rowgroup">학생 C</th>
					<td>88</td>
					<td>87</td>
					<td>85</td>
					<td>89</td>
				</tr>
			</tbody>
			<tfoot>
				<tr>
					<th scope="row">평균</th>
					<td>83.7</td>
					<td>86.7</td>
					<td>85.7</td>
					<td>90.7</td>
				</tr>
			</tfoot>
		</table>

		<style>
      table {
        width: 100%;
				min-width: 400px;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #bbb;
        padding: 8px;
      }
      th {
        background-color: #eee;
      }
		</style>
	</body>
</html>
