<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[table] 셀 병합 예제 (colspan, rowspan)</title>
	</head>
	<body>
		<h2 style="color: red;">비권장 방식(table 속성 사용)</h2>
		<table width="100%" border="1">
			<tr>
				<th colspan="2">상품 정보</th>
			</tr>
			<tr>
				<td rowspan="2">전자기기</td>
				<td>스마트폰</td>
			</tr>
			<tr>
				<td>태블릿</td>
			</tr>
		</table>
		<hr>

		<h2 style="color: green;">권장 방식(CSS 사용)</h2>
		<table class="table">
			<tr>
				<th colspan="2">상품 정보</th>
			</tr>
			<tr>
				<td rowspan="2">전자기기</td>
				<td>스마트폰</td>
			</tr>
			<tr>
				<td>태블릿</td>
			</tr>
		</table>

		<style>
			h2 {font-size: 16px;}
			hr {
				margin: 20px 0;
				border-top: 1px dashed #bbb;
			}
			.table {
				width: 100%;
				border-collapse: collapse;
			}
			.table th, .table td {
				border: 1px solid #bbb;
				padding: 8px;
			}
			.table th {
				background-color: #eee;
			}
		</style>
	</body>
</html>
