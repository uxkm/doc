<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[table] 기본 테이블 예제</title>
	</head>
	<body>
		<h2 style="color: red;">비권장 방식(table 속성 사용)</h2>
		<table width="100%" border="1">
			<tr>
				<th>이름</th>
				<th>나이</th>
				<th>직업</th>
			</tr>
			<tr>
				<td>홍길동</td>
				<td>30</td>
				<td>개발자</td>
			</tr>
			<tr>
				<td>임꺽정</td>
				<td>43</td>
				<td>기획자</td>
			</tr>
		</table>
		<hr>

		<h2 style="color: green;">권장 방식(CSS 사용)</h2>
		<table class="table">
			<tr>
				<th>이름</th>
				<th>나이</th>
				<th>직업</th>
			</tr>
			<tr>
				<td>홍길동</td>
				<td>30</td>
				<td>개발자</td>
			</tr>
			<tr>
				<td>임꺽정</td>
				<td>43</td>
				<td>기획자</td>
			</tr>
		</table>

		<style>
			h2 {font-size: 16px;}
			hr {
				margin: 20px 0;
				border-top: 1px dashed #bbb;
			}
			.table {
				width: 100%;
				border-collapse: collapse;
			}
			.table th, .table td {
				border: 1px solid #bbb;
				padding: 8px;
			}
			.table th {
				background-color: #eee;
			}
		</style>
	</body>
</html>
