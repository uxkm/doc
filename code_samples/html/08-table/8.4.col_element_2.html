<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[col] span 속성을 사용해 여러 열에 스타일 적용</title>
	</head>
	<body>
		<table>
			<colgroup>
				<col style="width:120px; background-color: #d4f0f9;">
				<col span="2" style="width:80px; background-color: #deffde;">
			</colgroup>
			<tr>
				<th>이름</th>
				<th>나이</th>
				<th>직업</th>
			</tr>
			<tr>
				<td>홍길동</td>
				<td>30</td>
				<td>개발자</td>
			</tr>
			<tr>
				<td>임꺽정</td>
				<td>43</td>
				<td>기획자</td>
			</tr>
		</table>

		<style>
			table {
				border-collapse: collapse;
			}
			th, td {
				border: 1px solid #bbb;
				padding: 8px;
			}
		</style>
	</body>
</html>
