<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[datalist] 기본적인 자동완성 목록</title>
	</head>
	<body>
		<label for="job">직업 입력:</label>
		<input list="jobs" id="job" name="job">
		<datalist id="jobs">
			<option value="기획자">
			<option value="디자이너">
			<option value="퍼블리셔">
			<option value="개발자">
			<option value="마케터">
		</datalist>
	</body>
</html>
