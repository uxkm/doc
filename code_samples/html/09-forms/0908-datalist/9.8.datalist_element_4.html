<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[datalist] 일반 텍스트, 검색창, 전화번호, 이메일 자동완성</title>
		<style>
			body {padding-top:5px;}
			hr {margin:15px 0;}
			p {margin:0 0 10px;}
			input {
				width: 150px;
				padding: 10px;
				font-size: 16px;
				border: 1px solid #ccc;
				border-radius: 4px;
			}
			.info {font-size:16px; color:#1e73ff;}
		</style>
	</head>
	<body>
		<p>
			<b>제품 수량 선택</b><br />
			<span class="info">(input number 타입과 연계)</span>
		</p>
		<div class="quantity-options-container">
			<label for="quantity">구매 수량 선택:</label>
			<input type="number" id="quantity" name="quantity" list="quantity-options" min="1" max="100" step="1" placeholder="수량 입력">
			<datalist id="quantity-options">
				<option value="1"></option>
				<option value="5"></option>
				<option value="10"></option>
				<option value="20"></option>
				<option value="50"></option>
				<option value="100"></option>
			</datalist>
		</div>
		<hr>

		<p>
			<b>음량 조절 슬라이더</b><br />
			<span class="info">(input range 타입과 연계)</span>
		</p>
		<div class="volume-levels-container">
			<label for="volume">🔊 음량 조절:</label>
			<input type="range" id="volume" name="volume" list="volume-levels" min="0" max="100" step="20">
			<datalist id="volume-levels">
				<option value="0" label="Mute"></option>
				<option value="20"></option>
				<option value="40"></option>
				<option value="60"></option>
				<option value="80"></option>
				<option value="100" label="Max"></option>
			</datalist>
		</div>
		<style>
			.volume-levels-container {
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.volume-levels-container input {
				flex:1;
				width: calc(100% - 100px);
				max-width: 160px;
			}
		</style>
	</body>
</html>
