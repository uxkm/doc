<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[progress] 다른 요소로 progress 표현</title>
	</head>
	<body>
		<label for="fileUpload">파일 업로드:</label>
		<input type="file" id="fileUpload" aria-describedby="progressLabel">
		<div class="progress-container" role="progressbar" aria-labelledby="progressLabel" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
			<div class="progress-bar" id="progressBar">
				<span class="progress-text" id="progressText">0%</span>
			</div>
		</div>
		<p id="progressLabel">업로드 진행률: <span id="progressAnnounce">0%</span></p>
		<button type="button" class="reset" onclick="reset()">초기화</button>
		<script>
			let fileUpload = document.getElementById("fileUpload");
			let progressBar = document.getElementById("progressBar");
			let progressText = document.getElementById("progressText");
			let progressContainer = document.querySelector(".progress-container");
			let progressAnnounce = document.getElementById("progressAnnounce");
			let progress = 0;

			fileUpload.addEventListener("change", function () {
				let interval = setInterval(() => {
					if (progress < 100) {
						progress += 10;
						progressBar.style.width = progress + "%";
						progressText.textContent = progress + "%";
						progressText.classList.add("active");
						progressContainer.setAttribute("aria-valuenow", progress);
						progressAnnounce.textContent = progress + "%";
					} else {
						clearInterval(interval);
					}
				}, 100);
			});

			function reset(){
				progress = 0;
				fileUpload.value = '';
				progressBar.style.width = progress + "%";
				progressText.textContent = progress + "%";
				progressText.classList.remove('active');
				progressContainer.setAttribute("aria-valuenow", progress);
				progressAnnounce.textContent = progress + "%";
			}
		</script>

		<style>
			*, html, body {vertical-align:top;}
			body {padding-top:5px;}

			label {
				font-size: 16px;
				font-weight: bold;
			}
			input[type="file"] {
				display: block;
				margin-top: 5px;
				margin-bottom: 15px;
			}
			.progress-container {
				overflow: hidden;
				position: relative;
				width: 100%;
				height: 26px;
				background-color: #f3f3f3;
				border-radius: 10px;
				box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
			}
			.progress-bar {
				position: relative;
				width: 0;
				height: 100%;
				background: linear-gradient(90deg, #4caf50, #8bc34a);
				border-radius: 10px;
				transition: width 0.1s ease-in-out;
			}
			.progress-bar::after {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 70%);
				opacity: 0.4;
				content: "";
			}
			.progress-text {
				display: none;
				position: absolute;
				width: 100%;
				top: 50%;
				font-size: 14px;
				text-align: center;
				font-weight: bold;
				color: #fff;
				text-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
				transform: translateY(-50%);
			}
			.progress-text.active {
				display: block;
			}
			.reset {
				margin-top: 10px;
				color: red;
			}
		</style>
	</body>
</html>
