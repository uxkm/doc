<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[button] 폼 초기화 버튼 (type="reset")</title>
		<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
		<style>
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 15px;
				padding: 20px;
			}

			/* 1. 기본 스타일 버튼 */
			.btn-basic {
				padding: 12px 24px;
				font-size: 16px;
				color: white;
				background-color: #007bff;
				border: none;
				border-radius: 6px;
				cursor: pointer;
				transition: background 0.3s;
			}
			.btn-basic:hover {
				background-color: #0056b3;
			}

			/* 2. 그림자 효과 버튼 */
			.btn-shadow {
				padding: 12px 24px;
				font-size: 16px;
				color: white;
				background-color: #28a745;
				border: none;
				border-radius: 6px;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
				cursor: pointer;
				transition: box-shadow 0.3s, transform 0.2s;
			}
			.btn-shadow:hover {
				box-shadow: 0 6px 10px rgba(0, 0, 0, 0.3);
				transform: translateY(-2px);
			}

			/* 3. 테두리 버튼 */
			.btn-outline {
				padding: 12px 24px;
				font-size: 16px;
				color: #dc3545;
				background: none;
				border: 2px solid #dc3545;
				border-radius: 6px;
				cursor: pointer;
				transition: background 0.3s, color 0.3s;
			}
			.btn-outline:hover {
				background: #dc3545;
				color: white;
			}

			/* 4. 아이콘 버튼 */
			.btn-icon {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 12px 20px;
				font-size: 16px;
				color: white;
				background-color: #ffc107;
				border: none;
				border-radius: 6px;
				cursor: pointer;
				transition: background 0.3s;
			}
			.btn-icon i {
				font-size: 18px;
			}
			.btn-icon:hover {
				background-color: #e0a800;
			}

			/* 5. 둥근 버튼 */
			.btn-round {
				width: 50px;
				height: 50px;
				display: flex;
				align-items: center;
				justify-content: center;
				background-color: #17a2b8;
				color: white;
				font-size: 20px;
				border: none;
				border-radius: 50%;
				cursor: pointer;
				transition: background 0.3s, transform 0.2s;
			}
			.btn-round:hover {
				background-color: #138496;
				transform: scale(1.1);
			}
		</style>
	</head>
	<body>
		<button type="button" class="btn-basic">기본 버튼</button>

		<button type="button" class="btn-shadow">그림자 버튼</button>

		<button type="button" class="btn-outline">테두리 버튼</button>

		<button type="button" class="btn-icon">
			<i class="fas fa-check"></i> 아이콘 버튼
		</button>

		<button type="button" class="btn-round">
			<i class="fas fa-heart"></i>
		</button>
	</body>
</html>
