<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[button] 폼 초기화 버튼 (type="reset")</title>
		<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
		<style>
			hr {margin:15px 0;}
			button {margin:10px 0 0;}
			p {margin:0;}
		</style>
	</head>
	<body>
		<p>아이콘 버튼</p>
		<button type="button" class="btn btn-save" onclick="alert('저장되었습니다!')">
			<i class="fas fa-save"></i> 저장하기
		</button>
		<button type="button" class="btn btn-delete" onclick="alert('삭제되었습니다!')">
			<i class="fas fa-trash-alt"></i> 삭제하기
		</button>
		<button type="button" class="btn btn-share" onclick="alert('공유되었습니다!')">
			<i class="fas fa-share"></i> 공유하기
		</button>
		<style>
			.btn {
				display: inline-flex;
				align-items: center;
				gap: 10px;
				padding: 10px 16px;
				font-size: 16px;
				font-weight: bold;
				color: white;
				border: none;
				border-radius: 6px;
				cursor: pointer;
			}
			.btn-save {
				background-color: #28a745;
			}
			.btn-save:hover {
				background-color: #218838;
			}
			.btn-delete {
				background-color: #dc3545;
			}
			.btn-delete:hover {
				background-color: #c82333;
			}
			.btn-share {
				background-color: #007bff;
			}
			.btn-share:hover {
				background-color: #0056b3;
			}
		</style>
		<hr>

		<p>이미지 버튼</p>
		<button type="button" class="image-button" onclick="alert('버튼이 클릭되었습니다!')">
			<img src="/_assets/images/html/image_button2.png" width="150" alt="제출 버튼">
		</button>
		<style>
			.image-button {
				vertical-align: top;
				padding: 0;
				border: 0;
				cursor: pointer;
			}
		</style>
	</body>
</html>
