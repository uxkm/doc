<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[button] 일반 버튼(type="button") / 비활성 버튼</title>
	</head>
	<body>
		<p>일반 버튼</p>
		<button type="button" onclick="alert('버튼이 클릭되었습니다!')">클릭하세요</button>
		<hr>

		<p>비활성 버튼</p>
		<button type="button" disabled>클릭할 수 없음</button>

		<style>
			hr {margin:15px 0;}
			button {margin:10px 0 0;}
			p {margin:0;}
		</style>
	</body>
</html>
