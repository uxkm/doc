<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[select] 기본 드롭다운 / 기본 선택값 설정</title>
	</head>
	<body>
		<p>기본 드롭다운 목록</p>
		<label for="city1">도시 선택:</label>
		<select name="city1" id="city1">
			<option value="">-- 선택하세요 --</option>
			<option value="seoul">서울</option>
			<option value="busan">부산</option>
			<option value="daejeon">대전</option>
		</select>
		<hr>

		<p>기본 선택값 설정 (selected 속성 사용)</p>
		<label for="city2">도시 선택:</label>
		<select name="city2" id="city2">
			<option value="">-- 선택하세요 --</option>
			<option value="seoul">서울</option>
			<option value="busan">부산</option>
			<option value="daejeon" selected>대전</option>
		</select>
		<hr>

		<p>비활성 목록 (disabled 속성 사용)</p>
		<label for="city3">도시 선택:</label>
		<select name="city3" id="city3" disabled>
			<option value="">-- 선택하세요 --</option>
			<option value="seoul">서울</option>
			<option value="busan">부산</option>
			<option value="daejeon" selected>대전</option>
		</select>
		<hr>

		<p>특정 option만 비활성 (disabled 속성 사용)</p>
		<label for="city4">도시 선택:</label>
		<select name="city4" id="city4">
			<option value="">-- 선택하세요 --</option>
			<option value="seoul">서울</option>
			<option value="busan" disabled>부산</option>
			<option value="daejeon" selected>대전</option>
		</select>

		<style>
			hr {margin:15px 0;}
			select {margin:10px 0 0;}
			p {margin:0;}
		</style>
	</body>
</html>
