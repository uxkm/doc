<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[input] readonly 속성</title>
	</head>
	<body>
		<b>type="text"</b><br />
		<input type="text" value="홍길동" readonly>
		<hr>

		<b>type="datetime-local"</b><br />
		<input type="datetime-local" value="2025-03-13T10:30" readonly>
		<hr>

		<p>
			checkbox, radio, range, file, button, submit, reset 타입에는 readonly 속성이 적용되지 않습니다.
			readonly 속성은 텍스트 기반 입력 필드에만 사용 가능합니다.
		</p>

		<style>
			hr {margin:15px 0;}
			input {margin-top:10px;}
			p {margin-top:10px;}
		</style>
	</body>
</html>
