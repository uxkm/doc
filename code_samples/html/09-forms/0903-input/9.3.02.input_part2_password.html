<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[type="password"] 비밀번호 입력 필드</title>
		<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
		<style>
			hr {margin:15px 0;}
			input:not(.password-input) {margin:10px 0 0;}
			p {margin:0;}
		</style>
	</head>
	<body>
		<p>기본 비밀번호 입력</p>
		<input type="password" name="userpass" placeholder="비밀번호 입력">
		<hr>

		<p>비밀번호 작성 시 동그라미 크기</p>
		<input type="password" name="userpass" value="password" placeholder="비밀번호 입력" class="pw-size">
		<input type="password" name="userpass" value="password" placeholder="비밀번호 입력" class="pw-size large-dot">

			.pw-size {
				vertical-align: top;
				width: 130px;
				height: 24px;
			}
			.large-dot:not(:placeholder-shown){
				font-family: "pass";
				font-size: 30px;

		</style>
		<hr>

		<p>최소/최대 길이 제한</p>
		<form>
			<input type="password" name="securepass" minlength="8" maxlength="20" placeholder="8~20자 입력" required>
			<input type="submit" value="Send">
		</form>
		<hr>

		<p>정규 표현식 패턴 적용</p>
		<form>
			<input type="password" id="complexpass" name="complexpass"
						 pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
						 title="영문 대소문자, 숫자를 포함하여 8자 이상 입력" required>
			<input type="submit" value="Send">
		</form>
		<hr>

		<p>비밀번호 표시/숨기기</p>
		<div class="password-container">
			<input type="password" id="password" class="password-input" placeholder="비밀번호 입력">
			<span class="toggle-password" onclick="togglePassword()"><i class="fas fa-eye"></i></span> <!-- 가려진 눈 아이콘 -->
		</div>
		<style>
      /* 비밀번호 표시/숨기기 */
      .password-container {
        position: relative;
        display: inline-block;
				margin-top: 10px;
      }
      .password-input {
				vertical-align: top;
        width: 200px;
        padding: 10px 40px 10px 10px;
        font-size: 16px;
      }
      .toggle-password {;
        position: absolute;
        right: 0;
        top: 0;
				display: flex;
				align-items: center;
				justify-content: center;
        width: 40px;
				height: 100%;
        font-size: 18px;
				color: #888;
        cursor: pointer;
      }
		</style>
		<script>
      function togglePassword() {
        let passwordInput = document.getElementById("password");
        let toggleIcon = document.querySelector(".toggle-password i");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.classList.remove("fa-eye");
          toggleIcon.classList.add("fa-eye-slash");
        } else {
          passwordInput.type = "password";
          toggleIcon.classList.remove("fa-eye-slash");
          toggleIcon.classList.add("fa-eye");
        }
      }
		</script>
	</body>
</html>
