<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[type="button"] 일반 버튼</title>
	</head>
	<body>
		<p>기본 버튼</p>
		<input type="button" value="클릭하세요">
		<hr>

		<p>JavaScript 이벤트 적용</p>
		<input type="button" value="알림" onclick="alert('버튼이 클릭되었습니다!')">
		<hr>

		<p>스타일 적용</p>
		<input type="button" value="버튼" class="custom-button">

		<style>
      hr {margin:15px 0;}
      input {margin:10px 0 0;}
			p {margin:0;}

			.custom-button {
				width: 150px;
				height: 50px;
				font-size: 18px;
				color: white;
				background-color: #1e73ff;
				border: 0;
				border-radius: 5px;
			}
		</style>
	</body>
</html>
