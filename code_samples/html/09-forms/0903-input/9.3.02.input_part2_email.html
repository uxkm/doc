<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[type="email"] 이메일 입력 필드</title>
	</head>
	<body>
		<p>기본 이메일 입력 필드</p>
		<input type="email" name="useremail" placeholder="이메일 입력">
		<hr>

		<p>정규 표현식 검증 / 자동완성 비활성화</p>
		<form>
			<input type="email" name="contactemail" autocomplete="off" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"
						 placeholder="형식에 맞는 이메일 주소 입력" size="25"
						 title="형식에 맞는 이메일 주소 입력" required>
			<input type="submit" value="Send">
		</form>
		<hr>

		<p>여러 개의 이메일 입력 허용</p>
		<form>
			<input type="email" name="emails" autocomplete="off" size="35"
						 placeholder="콤마(,)로 구분하여 여러개의 이메일 주소 입력"
						 title="형식에 맞는 이메일 주소 입력" multiple required>
			<input type="submit" value="Send">
		</form>

		<style>
      hr {margin:15px 0;}
      input {margin:10px 0 0;}
			p {margin:0;}
		</style>
	</body>
</html>
