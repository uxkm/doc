<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[type="search"] 검색 입력 필드</title>
	</head>
	<body>
		<p>기본 검색 필드</p>
		<input type="search" name="query" placeholder="검색어 입력">
		<hr>

		<p>자동완성 비활성화</p>
		<input type="search" name="product" autocomplete="off" placeholder="상품 검색">
		<hr>

		<p>입력 방향(dirname) 설정</p>
		<input type="search" name="keyword" dirname="search.dir">

		<style>
      hr {margin:15px 0;}
      input {margin:10px 0 0;}
			p {margin:0;}
		</style>
	</body>
</html>
