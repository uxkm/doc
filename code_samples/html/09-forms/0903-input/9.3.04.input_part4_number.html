<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[type="number"] 숫자 입력 필드</title>
		<style>
			hr {margin:15px 0;}
			input {margin:10px 0 0;}
			p {margin:0;}
		</style>
	</head>
	<body>
		<p>기본 숫자 입력</p>
		<input type="number" name="quantity">
		<hr>

		<p>최소값, 최대값 설정(위 아래 화살표를 클릭해 보세요)</p>
		<input type="number" name="age" min="18" max="99">
		<hr>

		<p>증가 단위(step) 지정</p>
		<input type="number" name="rating" min="0" max="5" step="0.5">
		<hr>

		<p>위아래 화살표 버튼 커스텀(button 요소 사용)</p>
		<div class="number-input">
			<button type="button" class="minus-button" onclick="changeValue(-1)">-</button>
			<input type="number" id="customNumber" value="0" min="0" max="100">
			<button type="button" class="plus-button" onclick="changeValue(1)">+</button>
		</div>
		<style>
			:root {
				--input-height: 34px;
				--border-color: #aaa;
				--border-radius: 5px;
			}
			.number-input {
				display: inline-flex;
				align-items: center;
				margin-top: 10px;
			}
			.number-input input {
				position: relative;
				z-index: 1;
				width: 60px;
				height: var(--input-height);
				margin: 0;
				padding: 0 5px;
				font-size: 16px;
				text-align: center;
				border: 0;
				border-top: 1px solid var(--border-color);
				border-bottom: 1px solid var(--border-color);
				/* 기본 화살표 제거 */
				-moz-appearance: textfield;
				box-sizing: border-box;
			}
			.number-input input::-webkit-outer-spin-button,
			.number-input input::-webkit-inner-spin-button {
				margin: 0;
				-webkit-appearance: none;
			}
			.number-input button {
				width: var(--input-height);
				height: var(--input-height);
				font-size: 16px;
				color: white;
				background-color: #bbb;
				border: 1px solid var(--border-color);
				cursor: pointer;
				transition: background-color 0.15s, border-color 0.15s;
			}
			.number-input .minus-button {
				border-radius: var(--border-radius) 0 0 var(--border-radius);
			}
			.number-input .plus-button {
				border-radius: 0 var(--border-radius) var(--border-radius) 0;
			}
			.number-input button:hover {
				background-color: #1e73ff;
				border-color: #1e73ff;
			}
		</style>
		<script>
			function changeValue(amount) {
				const input = document.getElementById('customNumber');
				let value = parseInt(input.value) || 0;
				let min = input.min ? parseInt(input.min) : -Infinity;
				let max = input.max ? parseInt(input.max) : Infinity;

				value += amount;

				if (value >= min && value <= max) {
					input.value = value;
				}
			}
		</script>
	</body>
</html>
