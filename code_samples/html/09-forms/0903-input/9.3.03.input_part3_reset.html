<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[type="reset"] 폼 초기화 버튼</title>
	</head>
	<body>
		<p>기본 초기화 버튼</p>
		<input type="reset" value="초기화">
		<hr>

		<p>초기화 버튼 작동 확인(내용 작성 후 초기화 버튼을 클릭하세요.)</p>
		<form>
			<h2>회원가입</h2>

			<label for="username">사용자명</label>
			<input type="text" id="username" name="username" required placeholder="사용자명을 입력하세요">

			<label for="email">이메일</label>
			<input type="email" id="email" name="email" required placeholder="이메일 주소를 입력하세요">

			<label for="password">비밀번호</label>
			<input type="password" id="password" name="password" required placeholder="비밀번호를 입력하세요">

			<div class="button-container">
				<button type="submit">제출</button>
				<button type="reset">초기화</button>
			</div>
		</form>

		<style>
      hr {margin:15px 0;}
      input {margin:10px 0 0;}
			p {margin:0;}

			form {
				width: 100%;
				max-width: 300px;
				margin-top: 10px;
				padding: 20px;
				background-color: #fff;
				border: 1px solid #ccc;
				border-radius: 10px;
				box-sizing: border-box;
			}
			h2 {
				margin: 0;
				padding: 0;
				text-align: center;
				color: #333;
			}
			label {
				display: block;
				margin: 10px 0 0;
				font-size: 14px;
				color: #555;
			}
			input[type="text"],
			input[type="email"],
			input[type="password"] {
				width: 100%;
				margin: 8px 0 10px;
				padding: 8px;
				font-size: 14px;
				border: 1px solid #ccc;
				border-radius: 4px;
				box-sizing: border-box;
			}
			.button-container {
				display: flex;
				justify-content: space-between;
			}
			button {
				width: 48%;
				margin-top: 10px;
				padding: 10px;
				font-size: 14px;
				border: none;
				border-radius: 4px;
				cursor: pointer;
			}
			button[type="submit"] {
				color: white;
				background-color: #4CAF50;
			}
			button[type="reset"] {
				color: white;
				background-color: #f44336;
			}
			button:hover {
				opacity: 0.8;
			}
		</style>
	</body>
</html>
