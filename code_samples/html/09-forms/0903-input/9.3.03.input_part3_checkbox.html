<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[type="checkbox"] 다중 선택 체크박스</title>
		<style>
			hr {margin:15px 0;}
			input {margin:10px 0 0;}
			p {margin:0;}
		</style>
	</head>
	<body>
		<p>기본 체크박스</p>
		<input type="checkbox" name="option1" value="A"> 옵션 A
		<hr>

		<p>기본 체크된 상태</p>
		<input type="checkbox" name="subscribe" checked> 뉴스레터 구독
		<hr>

		<p>여러 개의 선택지(명시적 라벨 사용)</p>
		<input type="checkbox" id="reading" name="hobby1" value="reading">
		<label for="reading">독서</label>
		<input type="checkbox" id="traveling" name="hobby1" value="traveling">
		<label for="traveling">여행</label>
		<input type="checkbox" id="sports" name="hobby1" value="sports">
		<label for="sports">스포츠</label>
		<hr>

		<p>여러 개의 선택지(암묵적 라벨 사용)</p>
		<label>
			<input type="checkbox" name="hobby2" value="reading">
			독서
		</label>
		<label>
			<input type="checkbox" name="hobby2" value="traveling">
			여행
		</label>
		<label>
			<input type="checkbox" name="hobby2" value="sports">
			스포츠
		</label>
		<hr>

		<p>체크박스 디자인 커스텀(Switch button)</p>
		<label class="switch-button">
			<input type="checkbox" name="hobby2" value="reading">
			<span>Switch button</span>
		</label>
		<style>
			:root {
				--switch-button-circle-size: 30px;
				--switch-button-move-size: 25px;
				--switch-button-border-width: 4px;
				--switch-button-default-color: #ccc;
				--switch-button-active-color: #1e73ff;
				--switch-button-duration: .15s;
			}
			.switch-button {
				position: relative;
				margin-top: 10px;
				cursor: pointer;
			}
			.switch-button input {
				position: absolute;
				left: 0;
				top: 0;
				opacity: 0;
				width: 100%;
				height: 100%;
			}
			.switch-button span {
				display: inline-block;
				position: relative;
				width: calc(var(--switch-button-circle-size) + var(--switch-button-move-size));
				height: calc(var(--switch-button-circle-size));
				font-size: 0;
				text-indent: -9999px;
				background-color: var(--switch-button-default-color);
				border: var(--switch-button-border-width) solid var(--switch-button-default-color);
				border-radius: calc(var(--switch-button-circle-size) + (var(--switch-button-border-width)*2));
				transition: border-color var(--switch-button-duration), background-color var(--switch-button-duration);
			}
			.switch-button span:after {
				position: absolute;
				left: 0;
				top: 0;
				width: var(--switch-button-circle-size);
				height: var(--switch-button-circle-size);
				background-color: #fff;
				border-radius: 100%;
				transition: transform var(--switch-button-duration);
				content: "";
			}

			/* Switch button active */
			.switch-button input:checked + span {
				background-color: var(--switch-button-active-color);
				border-color: var(--switch-button-active-color);
			}
			.switch-button input:checked + span:after {
				transform: translateX(var(--switch-button-move-size));
			}
		</style>
	</body>
</html>
