<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[textarea] rows, cols 속성을 활용한 크기 조정</title>
		<style>
			body {padding-top:5px;}
			hr {margin:15px 0;}
			p {margin:0 0 10px;}
			.info {font-size:16px; color:#1e73ff;}
		</style>
	</head>
	<body>
		<p>
			<b>rows="3" cols="15"</b>
		</p>
		<textarea name="message" rows="3" cols="15" placeholder="크기 조정이 가능합니다."></textarea>
		<hr>

		<p>
			<b>rows="4" cols="30"</b>
		</p>
		<textarea name="message" rows="4" cols="30" placeholder="크기 조정이 가능합니다."></textarea>
		<hr>

		<p>
			<b>rows="5" cols="35"</b>
		</p>
		<textarea name="message" rows="5" cols="35" placeholder="크기 조정이 가능합니다."></textarea>
	</body>
</html>
