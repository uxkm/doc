<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[label] 명시적과 암묵적의 차이</title>
	</head>
	<body>
		<h2>명시적 방식</h2>
		<label for="username">이름:</label>
		<input type="text" id="username" name="username">
		<hr>

		<h2>암묵적 방식</h2>
		<label>
			이름: <input type="text" name="username">
		</label>
	</body>
</html>
