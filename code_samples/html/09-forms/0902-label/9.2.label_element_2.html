<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>[label] 체크박스와 label 연결</title>
	</head>
	<body>
		<h2>명시적 방식</h2>
		<input type="checkbox" id="agree" name="agree">
		<label for="agree">이용약관에 동의합니다.</label>
		<hr>

		<h2>암묵적 방식</h2>
		<label>
			<input type="checkbox" name="agree">
			이용약관에 동의합니다.
		</label>
	</body>
</html>
