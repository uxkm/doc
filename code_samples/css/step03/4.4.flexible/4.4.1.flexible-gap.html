<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width">
		<meta name="format-detection" content="telephone=no, address=no, email=no, date=no">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>UXKM CSS3 flexible gap</title>
		<style>
			*{margin:0;padding:0;box-sizing:border-box;}

			.box {
				display: flex;
				flex-wrap: wrap;
				width: 400px;
				margin-bottom: 40px;
				border: 1px solid #ddd;
				padding: 10px;
			}

			.item {
				background: #eee;
				border: 1px solid #ccc;
				width: 100px;
				height: 60px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			/* gap: <column-gap> <row-gap> */
			.double-gap {
				gap: 20px 40px;  /* column-gap: 20px, row-gap: 40px */
			}

			/* gap: <length> */
			.single-gap {
				gap: 20px;      /* column-gap: 20px, row-gap: 20px */
			}
		</style>
	</head>
	<body>
		<h2>gap: 20px(column gap) 40px(row gap)</h2>
		<div class="box double-gap">
			<div class="item">1</div>
			<div class="item">2</div>
			<div class="item">3</div>
			<div class="item">4</div>
			<div class="item">5</div>
			<div class="item">6</div>
		</div>

		<h2>gap: 20ox(column, row gap)</h2>
		<div class="box single-gap">
			<div class="item">1</div>
			<div class="item">2</div>
			<div class="item">3</div>
			<div class="item">4</div>
			<div class="item">5</div>
			<div class="item">6</div>
		</div>
	</body>
</html>
