<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light dark">
	<title>prefers-color-scheme 예제</title>
	<style>
		:root {
			color-scheme: light dark;
		}

		body {
			font-family: Arial, sans-serif;
			padding: 0 2rem;
			background-color: white;
			color: #333;
			transition: background-color 0.3s ease, color 0.3s ease;
		}

		/* 다크 모드 스타일 */
		@media (prefers-color-scheme: dark) {
			body {
				background-color: #1a1a1a;
				color: #e0e0e0;
			}

			.card {
				background-color: #2d2d2d;
				border-color: #444;
			}

			.button {
				background-color: #4a90e2;
				color: white;
			}

			.button:hover {
				background-color: #5ba0f2;
			}
		}

		/* 라이트 모드 스타일 */
		@media (prefers-color-scheme: light) {
			body {
				background-color: white;
				color: #333;
			}

			.card {
				background-color: #f5f5f5;
				border-color: #ddd;
			}

			.button {
				background-color: #667eea;
				color: white;
			}

			.button:hover {
				background-color: #764ba2;
			}
		}

		.card {
			padding: 1.5rem;
			border-radius: 8px;
			border: 1px solid;
			margin: 1rem 0;
			transition: background-color 0.3s ease, border-color 0.3s ease;
		}

		.button {
			padding: 0.75rem 1.5rem;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-size: 1rem;
			transition: background-color 0.3s ease;
		}

		.info-box {
			background: rgba(102, 126, 234, 0.1);
			padding: 1rem;
			border-radius: 8px;
			margin-top: 2rem;
			border-left: 4px solid #667eea;
		}

		.info-box strong {
			display: block;
			margin-bottom: 0.5rem;
		}
	</style>
</head>
<body>
	<h1>prefers-color-scheme 예제</h1>
	<p>시스템의 다크 모드 설정에 따라 자동으로 색상이 변경됩니다.</p>

	<div class="card">
		<h2>카드 제목</h2>
		<p>이 카드는 시스템 다크 모드 설정에 따라 배경색과 텍스트 색상이 자동으로 변경됩니다.</p>
		<button class="button">버튼</button>
	</div>

	<div class="card">
		<h2>다른 카드</h2>
		<p>모든 요소가 일관된 색상 테마를 따릅니다.</p>
		<button class="button">다른 버튼</button>
	</div>
</body>
</html>
