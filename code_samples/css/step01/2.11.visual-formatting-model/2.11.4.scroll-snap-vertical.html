<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>스크롤 스냅 - 세로 스크롤 예제</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			padding: 0 2rem;
			background: #f5f5f5;
			margin: 0;
		}

		/* 세로 스크롤 갤러리 */
		.vertical-scroll {
			height: 400px;
			overflow-y: auto;
			scroll-snap-type: y mandatory;
			scroll-padding: 1rem;
			background: #f9f9f9;
			border-radius: 8px;
			padding: 1rem;
		}

		.vertical-scroll::-webkit-scrollbar {
			width: 8px;
		}

		.vertical-scroll::-webkit-scrollbar-track {
			background: #e0e0e0;
			border-radius: 4px;
		}

		.vertical-scroll::-webkit-scrollbar-thumb {
			background: #667eea;
			border-radius: 4px;
		}

		.gallery-item {
			height: 300px;
			background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
			border-radius: 8px;
			margin-bottom: 1rem;
			display: flex;
			align-items: center;
			justify-content: center;
			color: white;
			font-size: 1.5rem;
			font-weight: bold;
			scroll-snap-align: start;
		}
	</style>
</head>
<body>
	<h1>세로 스크롤 갤러리</h1>
	<p>세로로 스크롤하면 각 항목이 시작 지점에 자동으로 정렬됩니다.</p>

	<div class="vertical-scroll">
		<div class="gallery-item">갤러리 항목 1</div>
		<div class="gallery-item">갤러리 항목 2</div>
		<div class="gallery-item">갤러리 항목 3</div>
		<div class="gallery-item">갤러리 항목 4</div>
		<div class="gallery-item">갤러리 항목 5</div>
	</div>
</body>
</html>
