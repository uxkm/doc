<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width">
		<meta name="format-detection" content="telephone=no, address=no, email=no, date=no">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>UXKM CSS :has() Pseudo-class - 체크박스가 체크된 폼 필드</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 0 20px;
				line-height: 1.6;
			}
			h2 {
				color: #333;
				margin-bottom: 15px;
			}

			/* 예시 2: 체크박스가 체크된 폼 필드의 부모 스타일 변경 */
			.form-group:has(input[type="checkbox"]:checked) {
				background-color: #e8f5e9;
				border: 2px solid #4caf50;
			}

			.form-group {
				margin: 15px 0;
				padding: 15px;
				border: 1px solid #ddd;
				border-radius: 4px;
			}

			label {
				display: flex;
				align-items: center;
				cursor: pointer;
			}

			input[type="checkbox"] {
				margin-right: 8px;
				width: 18px;
				height: 18px;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<h2>:has() 선택자 - 체크박스가 체크된 폼 필드의 부모 스타일 변경</h2>
		<p>체크박스를 체크하면 해당 폼 그룹의 배경색과 테두리가 변경됩니다.</p>

		<div class="form-group">
			<label>
				<input type="checkbox" name="agree1">
				약관에 동의합니다 (체크하지 않음)
			</label>
		</div>
		<div class="form-group">
			<label>
				<input type="checkbox" name="agree2" checked>
				개인정보 처리방침에 동의합니다 (체크됨 - 초록색 배경)
			</label>
		</div>
		<div class="form-group">
			<label>
				<input type="checkbox" name="agree3">
				마케팅 수신에 동의합니다 (체크하지 않음)
			</label>
		</div>
		<div class="form-group">
			<label>
				<input type="checkbox" name="agree4" checked>
				이벤트 알림 수신에 동의합니다 (체크됨 - 초록색 배경)
			</label>
		</div>
	</body>
</html>
