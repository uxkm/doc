<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>하이브리드(잘못된 / 올바른 예시) : 명도 대비</title>
		<style>
      .button1 {
        background-color: #CCCCCC; /* 배경색: 연회색 */
        color: #AAAAAA; /* 전경색: 밝은 회색 */
        padding: 16px;
        border: none;
        font-size: 16px;
        border-radius: 5px;
      }
      .button2 {
        background-color: #007AFF; /* 배경색: 파란색 */
        color: #FFFFFF; /* 전경색: 흰색 */
        padding: 16px;
        border: none;
        font-size: 16px;
        border-radius: 5px;
      }
		</style>
	</head>
	<body>
		<p style="color: red;">잘못된 예시</p>
		<p class="text" style="color: #888888; background-color: #AAAAAA;">로그인</p> <!-- 명도 대비 부족 -->
		<button class="button1">제출</button>

		<hr>

		<p style="color: green;">올바른 예시</p>
		<p class="text" style="color: #000000; background-color: #FFFFFF;">로그인</p>
		<button class="button2">제출</button>
	</body>
</html>
