<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>하이브리드 앱 예시 (HTML/JavaScript) : 명도 대비</title>
		<style>
      body {
        font-family: Arial, sans-serif;
        background-color: #ddd; /* 배경색: 연회색 */
      }
      .button {
        background-color: #007AFF; /* 배경색: 파란색 */
        color: #FFFFFF; /* 전경색: 흰색 */
        padding: 16px;
        border: none;
        font-size: 16px;
        border-radius: 5px;
      }
      .text {
        color: #000000; /* 전경색: 검정색 */
        font-size: 18px;
        background-color: #FFFFFF; /* 배경색: 흰색 */
        padding: 10px;
      }
		</style>
	</head>
	<body>
		<p class="text">로그인</p>
		<button class="button">제출</button>
	</body>
</html>
