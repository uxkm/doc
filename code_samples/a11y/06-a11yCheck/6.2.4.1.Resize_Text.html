<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>하이브리드 방식의 예시 : 폰트 관련 기능의 활용</title>
		<style>
      body {
        font-size: calc(1em + 1vw); /* 텍스트 크기를 반응형으로 설정하여 운영체제 설정을 따름 */
        font-family: system-ui, sans-serif; /* 시스템 폰트를 사용하여 운영체제의 폰트 설정을 따름 */
      }
		</style>
	</head>
	<body>
		<p>운영체제의 폰트 설정을 따르는 텍스트 예시입니다.</p>
	</body>
</html>
