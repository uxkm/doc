<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>잘못된 예시 : 초당 3~50회 주기로 깜빡이는 콘텐츠</title>
		<style>
      #slider {
        width: 100%;
        height: 200px;
        overflow: hidden;
      }
      #slides {
        display: flex;
        width: 400%;
        animation: slide 12s infinite;
      }
      .slide {
        width: 100%;
        height: 200px;
      }
      @keyframes slide {
        0% { transform: translateX(0); }
        25% { transform: translateX(-100%); }
        50% { transform: translateX(-200%); }
        75% { transform: translateX(-300%); }
        100% { transform: translateX(0); }
      }
		</style>
	</head>
	<body>
		<div id="slider">
			<div id="slides">
				<div class="slide" style="background-color: red;"></div>
				<div class="slide" style="background-color: blue;"></div>
				<div class="slide" style="background-color: green;"></div>
				<div class="slide" style="background-color: yellow;"></div>
			</div>
		</div>
	</body>
</html>
