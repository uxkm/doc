<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>하이브리드 방식의 예시 : 입력 도움</title>
		<style>
      .error {
        color: red;
        display: none;
        margin-top: 8px;
      }
      .input-error {
        border-color: red; /* 오류가 있을 때 보더 컬러 */
      }
      input {
        border: 1px solid #ccc; /* 기본 보더 색상 */
        padding: 8px;
        border-radius: 4px;
      }
		</style>
	</head>
	<body>
		<form id="emailForm">
			<label for="emailInput">이메일:</label>
			<input type="email" id="emailInput" placeholder="example@domain.com" required>
			<div id="emailError" class="error">올바른 이메일 주소를 입력하세요.</div>
		</form>

		<script>
      const emailInput = document.getElementById('emailInput');
      const emailError = document.getElementById('emailError');

      emailInput.addEventListener('input', function() {
        // 이메일 필드가 비어 있지 않은 경우만 검증
        if (emailInput.value.trim() === '') {
          emailError.style.display = 'none'; // 입력값이 비어 있으면 에러 메시지 숨김
          emailInput.classList.remove('input-error'); // 보더 컬러 기본으로 복원
          return;
        }

        // 이메일 필드가 비어 있지 않을 때만 검증
        if (emailInput.validity.typeMismatch) {
          emailError.style.display = 'block'; // 유효하지 않은 경우 에러 메시지 표시
          emailInput.classList.add('input-error'); // 보더 컬러 빨간색으로 변경
        } else {
          emailError.style.display = 'none'; // 유효한 경우 에러 메시지 숨김
          emailInput.classList.remove('input-error'); // 보더 컬러 기본으로 복원
        }
      });
		</script>
	</body>
</html>
