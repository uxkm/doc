<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>하이브리드 앱 예시 (HTML/JavaScript) : 명도 대비</title>
		<style>
      .instruction {
        font-size: 16px;
        margin-bottom: 10px;
      }
      .button {
        background-color: #007AFF;
        color: #FFFFFF;
        padding: 10px 20px;
        border: none;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
      }
		</style>
	</head>
	<body>
		<p class="instruction">다음 단계로 진행하려면 아래 '다음' 버튼을 클릭하세요.</p>
		<button class="button" aria-label="다음 단계로 진행">다음</button> <!-- 명확한 레이블 제공 -->
	</body>
</html>
