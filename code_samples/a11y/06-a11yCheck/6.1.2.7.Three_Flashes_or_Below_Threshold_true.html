<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>올바른 예시 : 깜빡임을 제거한 콘텐츠</title>
		<style>
			.highlight {
				background-color: yellow;
				transition: background-color 0.5s ease;
			}
			.highlight:hover {
				background-color: orange;
			}
		</style>
	</head>
	<body>
		<p class="highlight">이 콘텐츠는 배경 색상이 부드럽게 변경됩니다!</p>
		<p>마우스를 올려보세요.</p>
	</body>
</html>
