<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>올바른 예시 : 키보드 사용 보장</title>
		<style>
      button, input[type="text"] {
        margin: 2px;
      }
      button:focus, input[type="text"]:focus {
        outline: 2px solid blue;
        outline-offset: 2px;
      }
		</style>
	</head>
	<body>
		<button>Button 1</button>
		<button>Button 2</button>
		<input type="text" placeholder="Text Input">
	</body>
</html>
