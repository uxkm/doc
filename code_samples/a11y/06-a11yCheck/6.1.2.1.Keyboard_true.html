<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>올바른 예시 : 키보드 사용 보장</title>
		<style>
			.custom-button {
				width: 100px; height: 50px;
        line-height: 50px; color: white; text-align: center;
        background-color: green;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<div role="button" tabindex="0" class="custom-button" onclick="alert('Button clicked!')" onkeypress="if(event.key === 'Enter') { this.click(); }">클릭하세요</div>

		<p>
			아래 일반 버튼과 동일하게 포커스가 작동됩니다.<br>
			단, p 또는 div 요소를 버튼으로 사용할 경우 <b style="color:green">role="button" tabindex="0"</b> 속성을 반드시 지정해야 합니다.
		</p>
		<button type="button">일반 버튼</button>
	</body>
</html>
