<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>하이브리드 방식의 예시 : 사용자 인터페이스의 일관성</title>
		<style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      /* 일관된 내비게이션 스타일 */
      .navbar {
        background-color: #333;
        overflow: hidden;
        color: #fff;
      }
      .navbar a {
        float: left;
        display: block;
        color: #fff;
        text-align: center;
        padding: 14px 20px;
        text-decoration: none;
      }
      .navbar a:hover {
        background-color: #ddd;
        color: #333;
      }

      /* 일관된 버튼 스타일 */
      .button {
        display: inline-block;
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
        color: #fff;
        background-color: #007bff;
        border: none;
        border-radius: 5px;
        text-align: center;
        text-decoration: none;
      }
      .button:hover {
        background-color: #0056b3;
      }
      .button:active {
        background-color: #004080;
      }
      .container {
        padding: 20px;
      }
      .content {
        padding: 20px;
      }

			@media(max-width:767px){
        .navbar a {
          padding: 10px 15px;
        }

        /* 일관된 버튼 스타일 */
        .button {
          padding: 6px 10px;
          margin: 5px;
        }
        .container {
          padding: 5px;
        }
        .content {
          padding: 5px;
        }
			}
		</style>
	</head>
	<body>
		<!-- 일관된 내비게이션 -->
		<div class="navbar">
			<a href="#home">홈</a>
			<a href="#services">서비스</a>
			<a href="#about">소개</a>
			<a href="#contact">연락처</a>
		</div>

		<div class="container">
			<div class="content">
				<h1>환영합니다!</h1>
				<p>이 웹사이트는 일관된 내비게이션 및 버튼 스타일을 제공합니다.</p>
				<button type="button" class="button">자세히 알아보기</button>
				<button type="button" class="button">문의하기</button>
			</div>
		</div>
	</body>
</html>
